<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --sidebar-bg: #f2f1ee;
    --border: #e8e6e1;
    --text: #1a1816;
    --text-muted: #9b9896;
    --text-faint: #c4c2bf;
    --accent: #2c2b28;
    --hover: #eeede9;
    --active: #e5e3de;
    --sidebar-w: 210px;
    --ff: 'Schibsted Grotesk', sans-serif;
    --fs: 13px;
    --lh: 1.4;
    --ls: -0.01em;
  }
  html, body { height: 100%; font-family: var(--ff); font-size: var(--fs); background: var(--bg); color: var(--text); -webkit-font-smoothing: auto; -moz-osx-font-smoothing: auto; text-rendering: optimizeLegibility; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s, min-width 0.2s, opacity 0.2s; }
  .sidebar.hidden { width: 0; min-width: 0; opacity: 0; pointer-events: none; }
  .sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
  .btn-icon:hover { background: var(--active); color: var(--text); }
  .sidebar-section { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); padding: 0 14px 5px; }
  .folder-item { display: flex; align-items: center; gap: 6px; padding: 4px 14px; cursor: pointer; transition: background 0.1s; user-select: none; color: var(--text); position: relative; }
  .folder-item:hover { background: var(--hover); }
  .folder-item.active { background: var(--active); font-weight: 500; }
  .folder-icon { color: var(--text-muted); flex-shrink: 0; }
  .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .folder-count { font-size: 10px; color: var(--text-faint); background: var(--border); border-radius: 10px; padding: 1px 5px; min-width: 18px; text-align: center; }
  .folder-actions { display: none; gap: 2px; }
  .folder-item:hover .folder-actions { display: flex; }
  .folder-actions button { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 1px 3px; border-radius: 3px; font-size: 11px; line-height: 1; }
  .folder-actions button:hover { background: var(--border); color: var(--text); }
  .folder-item.add-folder { color: var(--text-muted); font-size: 11px; }
  .folder-item.add-folder:hover { color: var(--text); }
  .notes-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .notes-list::-webkit-scrollbar { width: 3px; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .note-item { padding: 6px 14px; cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent; position: relative; }
  .note-item:hover { background: var(--hover); }
  .note-item.active { background: var(--active); border-left-color: var(--accent); }
  .note-item-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; font-size: 12px; }
  .note-item-preview { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-date { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
  .note-delete { display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-faint); padding: 2px 5px; border-radius: 3px; font-size: 13px; line-height: 1; }
  .note-item:hover .note-delete { display: block; }
  .note-delete:hover { color: #c0392b; background: #fdecea; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }

  /* TOOLBAR */
  .toolbar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 4px 14px; display: flex; align-items: center; gap: 1px; flex-wrap: wrap; }
  .toolbar-sep { width: 1px; height: 15px; background: var(--border); margin: 0 3px; }
  .tb-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; border-radius: 4px; color: var(--text-muted); font-family: var(--ff); font-size: 11px; display: flex; align-items: center; gap: 2px; transition: background 0.12s, color 0.12s; min-width: 24px; justify-content: center; line-height: 1; }
  .tb-btn:hover { background: var(--hover); color: var(--text); }
  .tb-select { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 3px; font-family: var(--ff); font-size: 11px; color: var(--text); cursor: pointer; outline: none; }
  .tb-select:hover { border-color: var(--text-muted); }
  .tb-label { font-size: 10px; color: var(--text-faint); margin-right: 1px; }
  .tb-number { width: 38px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-family: var(--ff); font-size: 11px; color: var(--text); outline: none; text-align: center; }
  .tb-number:hover, .tb-number:focus { border-color: var(--text-muted); }

  /* Highlight picker */
  .picker-wrap { position: relative; }
  .highlight-picker { display: none; position: absolute; top: 30px; left: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.1); gap: 5px; flex-wrap: wrap; width: 152px; }
  .highlight-picker.open { display: flex; }
  .hl-swatch { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; border: 1.5px solid rgba(0,0,0,0.07); transition: transform 0.1s; flex-shrink: 0; }
  .hl-swatch:hover { transform: scale(1.2); }
  .hl-divider { width: 100%; height: 1px; background: var(--border); margin: 2px 0; }
  .hl-color-row { display: flex; align-items: center; gap: 6px; width: 100%; }
  .hl-color-label { font-size: 10px; color: var(--text-muted); font-family: var(--ff); white-space: nowrap; }
  .hl-color-input { width: 28px; height: 20px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; padding: 1px; background: none; }
  .hl-remove { font-size: 10px; color: var(--text-muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); background: none; font-family: var(--ff); width: 100%; margin-top: 2px; }
  .hl-remove:hover { background: var(--hover); }

  /* EDITOR AREA */
  .editor-wrap { flex: 1; overflow-y: auto; padding: 32px 48px; display: flex; flex-direction: column; align-items: center; }
  .editor-wrap::-webkit-scrollbar { width: 5px; }
  .editor-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .note-title-input { width: 100%; max-width: 720px; background: none; border: none; outline: none; font-family: var(--ff); font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; caret-color: var(--text); letter-spacing: var(--ls); line-height: 1.3; }
  .note-title-input::placeholder { color: var(--text-faint); }
  .note-meta { width: 100%; max-width: 720px; font-size: 11px; color: var(--text-faint); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

  #editor { width: 100%; max-width: 720px; min-height: 400px; outline: none; font-family: var(--ff); font-size: var(--fs); line-height: var(--lh); letter-spacing: var(--ls); font-weight: 400; color: var(--text); caret-color: var(--text); word-break: break-word; }
  #editor:empty::before { content: attr(data-placeholder); color: var(--text-faint); pointer-events: none; }
  #editor p { margin: 0 0 1px; }
  #editor h1 { font-size: 16px; font-weight: 600; margin: 14px 0 5px; }
  #editor h2 { font-size: 14px; font-weight: 600; margin: 12px 0 4px; }
  #editor h3 { font-size: 13px; font-weight: 600; margin: 10px 0 3px; }
  #editor ul, #editor ol { padding-left: 18px; margin: 3px 0; }
  #editor li { margin: 1px 0; font-weight: 400; }
  #editor strong, #editor b { font-weight: 700; }
  #editor hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  #editor img { max-width: 100%; border-radius: 5px; margin: 6px 0; display: block; }
  #editor blockquote { background-color: #a5a0a020; border-left: none; margin: 6px 0; padding: 10px 12px 10px 16px; border-radius: 7px; color: #312f2ff5; }

  /* STATUS */
  .statusbar { border-top: 1px solid var(--border); padding: 4px 16px; display: flex; align-items: center; gap: 14px; background: var(--sidebar-bg); }
  .status-item { font-size: 10px; color: var(--text-faint); }
  .status-saved { color: #7a9e7a !important; }
  .status-error { color: #c0392b !important; }
  .status-syncing { color: #e8a838 !important; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-faint); gap: 8px; }
  .empty-state p { font-size: 12px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.12); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px; width: 290px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .modal h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .modal input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-family: var(--ff); font-size: 13px; background: var(--bg); color: var(--text); outline: none; margin-bottom: 10px; }
  .modal input:focus { border-color: var(--text-muted); }
  .modal-btns { display: flex; gap: 7px; justify-content: flex-end; }
  .modal-btns button { border: 1px solid var(--border); background: none; border-radius: 6px; padding: 5px 13px; font-family: var(--ff); font-size: 12px; cursor: pointer; transition: background 0.12s; color: var(--text); }
  .modal-btns button:hover { background: var(--hover); }
  .modal-btns button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btns button.primary:hover { opacity: 0.85; }

  .spinner { display: inline-block; width: 9px; height: 9px; border: 1.5px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Notas</span>
      <button class="btn-icon" onclick="openNewNoteModal()" title="Nova nota">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Pastas</div>
      <div id="folders-list"></div>
      <div class="folder-item add-folder" onclick="openNewFolderModal()">
        <svg class="folder-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="folder-name">Nova pasta</span>
      </div>
    </div>
    <div class="notes-list" id="notes-list"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <!-- Sidebar toggle -->
      <button class="tb-btn" onclick="toggleSidebar()" title="Ocultar/mostrar sidebar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <div class="toolbar-sep"></div>

      <!-- Font -->
      <span class="tb-label">fonte</span>
      <select class="tb-select" id="sel-font" onchange="applyTypo()">
        <option value="'Schibsted Grotesk', sans-serif" selected>Schibsted</option>
        <option value="'Inter', sans-serif">Inter</option>
        <option value="'IBM Plex Sans', sans-serif">IBM Plex</option>
        <option value="Georgia, serif">Georgia</option>
      </select>

      <!-- Font size -->
      <span class="tb-label" style="margin-left:4px">tam</span>
      <input class="tb-number" type="number" id="sel-size" value="13" min="9" max="24" onchange="applyTypo()">

      <!-- Line height -->
      <span class="tb-label" style="margin-left:4px">ent</span>
      <input class="tb-number" type="number" id="sel-lh" value="1.4" min="1" max="3" step="0.05" onchange="applyTypo()">

      <!-- Letter spacing -->
      <span class="tb-label" style="margin-left:4px">esp</span>
      <input class="tb-number" type="number" id="sel-ls" value="-0.01" min="-1" max="5" step="0.05" onchange="applyTypo()">

      <div class="toolbar-sep"></div>

      <button class="tb-btn" onclick="execCmd('bold')" title="Negrito (Ctrl+B)"><b style="font-weight:700">B</b></button>
      <button class="tb-btn" onclick="execCmd('italic')" title="Itálico (Ctrl+I)"><i>I</i></button>
      <button class="tb-btn" onclick="execCmd('underline')" title="Sublinhado (Ctrl+U)"><u>U</u></button>
      <button class="tb-btn" onclick="execCmd('strikeThrough')" title="Rasurado"><s>S</s></button>
      <div class="toolbar-sep"></div>
      <button class="tb-btn" onclick="execFormat('h1')">H1</button>
      <button class="tb-btn" onclick="execFormat('h2')">H2</button>
      <button class="tb-btn" onclick="execFormat('h3')">H3</button>
      <div class="toolbar-sep"></div>
      <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="Lista">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
      </button>
      <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="Lista numerada">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="tb-btn" onclick="execCmd('formatBlock','blockquote')" title="Citação">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>
      </button>
      <button class="tb-btn" onclick="insertHR()" title="Linha horizontal">—</button>
      <div class="toolbar-sep"></div>

      <!-- Highlight -->
      <div class="picker-wrap">
        <button class="tb-btn" onclick="toggleHighlightPicker(event)" title="Destacar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 4.8 5.6.8-4 3.9.9 5.5L12 14.5l-4.9 2.5.9-5.5-4-3.9 5.6-.8z" fill="currentColor" opacity="0.35"/></svg>
        </button>
        <div class="highlight-picker" id="highlight-picker">
          <div class="hl-swatch" style="background:#fde68a" onclick="applyHighlight('#fde68a')"></div>
          <div class="hl-swatch" style="background:#6ee7f7" onclick="applyHighlight('#6ee7f7')"></div>
          <div class="hl-swatch" style="background:#86efac" onclick="applyHighlight('#86efac')"></div>
          <div class="hl-swatch" style="background:#fca5a5" onclick="applyHighlight('#fca5a5')"></div>
          <div class="hl-swatch" style="background:#d8b4fe" onclick="applyHighlight('#d8b4fe')"></div>
          <div class="hl-swatch" style="background:#fdba74" onclick="applyHighlight('#fdba74')"></div>
          <div class="hl-swatch" style="background:#f9a8d4" onclick="applyHighlight('#f9a8d4')"></div>
          <div class="hl-swatch" style="background:#d1d5db" onclick="applyHighlight('#d1d5db')"></div>
          <div class="hl-divider"></div>
          <div class="hl-color-row">
            <span class="hl-color-label">personalizada</span>
            <input class="hl-color-input" type="color" id="hl-custom-color" value="#fde68a" onchange="applyHighlight(this.value)" title="Cor personalizada">
          </div>
          <button class="hl-remove" onclick="removeHighlight()">✕ remover destaque</button>
        </div>
      </div>

      <div class="toolbar-sep"></div>
      <button class="tb-btn" onclick="execCmd('removeFormat')" title="Limpar formatação">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M5 20h6"/><path d="M13 4l-6 16"/><line x1="17" y1="11" x2="22" y2="16"/><line x1="22" y1="11" x2="17" y2="16"/></svg>
      </button>
      <div style="flex:1"></div>
      <button class="tb-btn" onclick="saveNote(true)" title="Guardar (Ctrl+S)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
    </div>

    <div class="editor-wrap">
      <div class="empty-state" id="empty-state">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.25"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>Seleciona ou cria uma nota</p>
      </div>
      <input type="text" class="note-title-input" id="note-title" placeholder="Título" style="display:none" oninput="markDirty()">
      <div class="note-meta" id="note-meta" style="display:none"></div>
      <div id="editor" contenteditable="true" data-placeholder="Começa a escrever…" style="display:none" oninput="markDirty()"></div>
    </div>

    <div class="statusbar">
      <span class="status-item" id="status-words">0 palavras</span>
      <span class="status-item" id="status-folder">—</span>
      <span class="status-item" id="status-saved" style="margin-left:auto"></span>
    </div>
  </main>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-folder">
  <div class="modal">
    <h3 id="modal-folder-title">Nova pasta</h3>
    <input type="text" id="input-folder-name" placeholder="Nome da pasta" onkeydown="if(event.key==='Enter')confirmFolder()">
    <div class="modal-btns">
      <button onclick="closeModal('modal-folder')">Cancelar</button>
      <button class="primary" onclick="confirmFolder()">Guardar</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-note">
  <div class="modal">
    <h3>Nova nota</h3>
    <input type="text" id="input-note-name" placeholder="Título da nota" onkeydown="if(event.key==='Enter')confirmNewNote()">
    <div class="modal-btns">
      <button onclick="closeModal('modal-note')">Cancelar</button>
      <button class="primary" onclick="confirmNewNote()">Criar</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://tatvymywnvnwrpzyrwey.supabase.co';
const SB_KEY = 'sb_publishable_fQf2wI77du-X_oE4ML77og_Op6W80Ic';

async function sbGet() {
  const r = await fetch(`${SB_URL}/rest/v1/notas?select=*&order=updated_at.desc`, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(row) {
  const r = await fetch(`${SB_URL}/rest/v1/notas`, { method: 'POST', headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' }, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/notas?id=eq.${id}`, { method: 'DELETE', headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  if (!r.ok) throw new Error(await r.text());
}

let notes = [], folders = [], activeFolderId = null, activeNoteId = null;
let dirty = false, saveTimer = null, editingFolderId = null, savedSelection = null;
let sidebarVisible = true;

// Load typo prefs
const TYPO_KEY = 'notas_typo';
function loadTypo() {
  try { return JSON.parse(localStorage.getItem(TYPO_KEY)) || {}; } catch { return {}; }
}
function saveTypo(t) { localStorage.setItem(TYPO_KEY, JSON.stringify(t)); }

function applyTypo() {
  const font = document.getElementById('sel-font').value;
  const size = parseFloat(document.getElementById('sel-size').value) || 13;
  const lh = parseFloat(document.getElementById('sel-lh').value) || 1.55;
  const ls = parseFloat(document.getElementById('sel-ls').value) || 0.1;
  const r = document.documentElement;
  r.style.setProperty('--ff', font);
  r.style.setProperty('--fs', size + 'px');
  r.style.setProperty('--lh', lh);
  r.style.setProperty('--ls', ls + 'px');
  saveTypo({ font, size, lh, ls });
}

function initTypo() {
  const t = loadTypo();
  if (t.font) document.getElementById('sel-font').value = t.font;
  if (t.size) document.getElementById('sel-size').value = t.size;
  if (t.lh)   document.getElementById('sel-lh').value = t.lh;
  if (t.ls !== undefined) document.getElementById('sel-ls').value = t.ls;
  if (Object.keys(t).length) applyTypo();
}

// Sidebar
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  document.getElementById('sidebar').classList.toggle('hidden', !sidebarVisible);
}

async function init() {
  initTypo();
  setStatus('syncing', '<span class="spinner"></span> A carregar…');
  try {
    notes = await sbGet();
    deriveFolders();
    if (folders.length) activeFolderId = folders[0].id;
    renderFolders(); renderNotesList(); setStatus('', '');
  } catch(e) { setStatus('error', 'Erro: ' + e.message); }
}

function deriveFolders() {
  const map = {};
  notes.forEach(n => { if (!map[n.folder_id]) map[n.folder_id] = n.folder_name; });
  const existingIds = new Set(folders.map(f => f.id));
  Object.entries(map).forEach(([id, name]) => {
    if (!existingIds.has(id)) folders.push({ id, name });
    else { const f = folders.find(f => f.id === id); if (f) f.name = name; }
  });
  folders = folders.filter(f => map[f.id]);
}

function setStatus(type, msg) {
  const el = document.getElementById('status-saved');
  el.className = 'status-item' + (type ? ' status-' + type : '');
  el.innerHTML = msg;
}

function renderFolders() {
  const list = document.getElementById('folders-list');
  list.innerHTML = '';
  folders.forEach(f => {
    const count = notes.filter(n => n.folder_id === f.id).length;
    const div = document.createElement('div');
    div.className = 'folder-item' + (activeFolderId === f.id ? ' active' : '');
    div.innerHTML = `<svg class="folder-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span class="folder-name">${f.name}</span><span class="folder-count">${count}</span>
      <span class="folder-actions">
        <button onclick="event.stopPropagation();openRenameFolder('${f.id}')">✎</button>
        <button onclick="event.stopPropagation();deleteFolder('${f.id}')">×</button>
      </span>`;
    div.onclick = () => selectFolder(f.id);
    list.appendChild(div);
  });
}

function selectFolder(id) {
  if (dirty) saveNote(false);
  activeFolderId = id; activeNoteId = null;
  showEmptyState(); renderFolders(); renderNotesList();
}

function openNewFolderModal() {
  editingFolderId = null;
  document.getElementById('modal-folder-title').textContent = 'Nova pasta';
  document.getElementById('input-folder-name').value = '';
  document.getElementById('modal-folder').classList.add('open');
  setTimeout(() => document.getElementById('input-folder-name').focus(), 50);
}
function openRenameFolder(id) {
  editingFolderId = id;
  const f = folders.find(f => f.id === id);
  document.getElementById('modal-folder-title').textContent = 'Renomear pasta';
  document.getElementById('input-folder-name').value = f ? f.name : '';
  document.getElementById('modal-folder').classList.add('open');
  setTimeout(() => document.getElementById('input-folder-name').focus(), 50);
}
async function confirmFolder() {
  const name = document.getElementById('input-folder-name').value.trim();
  if (!name) return;
  closeModal('modal-folder');
  if (editingFolderId) {
    const toUpdate = notes.filter(n => n.folder_id === editingFolderId);
    setStatus('syncing', '<span class="spinner"></span>');
    try {
      for (const n of toUpdate) { n.folder_name = name; await sbUpsert(n); }
      const f = folders.find(f => f.id === editingFolderId); if (f) f.name = name;
      setStatus('saved', 'Guardado'); setTimeout(() => setStatus('', ''), 2000);
    } catch(e) { setStatus('error', 'Erro: ' + e.message); }
  } else {
    const id = uid(); folders.push({ id, name }); activeFolderId = id; showEmptyState();
  }
  renderFolders(); renderNotesList();
}
async function deleteFolder(id) {
  const f = folders.find(f => f.id === id);
  const count = notes.filter(n => n.folder_id === id).length;
  if (!confirm(`Apagar "${f?.name}"${count ? ` e ${count} nota(s)` : ''}?`)) return;
  setStatus('syncing', '<span class="spinner"></span>');
  try {
    for (const n of notes.filter(n => n.folder_id === id)) await sbDelete(n.id);
    notes = notes.filter(n => n.folder_id !== id);
    folders = folders.filter(f => f.id !== id);
    if (activeFolderId === id) { activeFolderId = folders.length ? folders[0].id : null; activeNoteId = null; showEmptyState(); }
    renderFolders(); renderNotesList(); setStatus('', '');
  } catch(e) { setStatus('error', 'Erro: ' + e.message); }
}

function renderNotesList() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  const fn = notes.filter(n => n.folder_id === activeFolderId).sort((a,b) => b.updated_at - a.updated_at);
  if (!fn.length) {
    const e = document.createElement('div');
    e.style.cssText = 'padding:14px;color:var(--text-faint);font-size:11px;text-align:center;';
    e.textContent = 'Sem notas aqui'; list.appendChild(e); return;
  }
  fn.forEach(n => {
    const div = document.createElement('div');
    div.className = 'note-item' + (activeNoteId === n.id ? ' active' : '');
    const preview = (n.content || '').replace(/<[^>]+>/g, '').slice(0, 55);
    div.innerHTML = `<div class="note-item-title">${n.title || 'Sem título'}</div>
      <div class="note-item-preview">${preview || '—'}</div>
      <div class="note-item-date">${formatDate(n.updated_at)}</div>
      <button class="note-delete" onclick="event.stopPropagation();deleteNote('${n.id}')">×</button>`;
    div.onclick = () => openNote(n.id);
    list.appendChild(div);
  });
}

function openNote(id) {
  if (dirty) saveNote(false);
  activeNoteId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('note-title').style.display = 'block';
  document.getElementById('note-meta').style.display = 'block';
  document.getElementById('editor').style.display = 'block';
  document.getElementById('note-title').value = note.title || '';
  document.getElementById('note-meta').textContent = 'Editado ' + formatDate(note.updated_at);
  document.getElementById('editor').innerHTML = note.content || '';
  document.getElementById('status-folder').textContent = note.folder_name || '—';
  updateWordCount(); renderNotesList(); dirty = false; setStatus('', '');
}
function showEmptyState() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('note-title').style.display = 'none';
  document.getElementById('note-meta').style.display = 'none';
  document.getElementById('editor').style.display = 'none';
}
function openNewNoteModal() {
  document.getElementById('input-note-name').value = '';
  document.getElementById('modal-note').classList.add('open');
  setTimeout(() => document.getElementById('input-note-name').focus(), 50);
}
async function confirmNewNote() {
  const title = document.getElementById('input-note-name').value.trim() || 'Nova nota';
  if (!activeFolderId) { alert('Seleciona uma pasta primeiro.'); return; }
  const folder = folders.find(f => f.id === activeFolderId);
  const now = Date.now();
  const note = { id: uid(), folder_id: activeFolderId, folder_name: folder?.name || '', title, content: '', created_at: now, updated_at: now };
  setStatus('syncing', '<span class="spinner"></span>');
  try {
    await sbUpsert(note); notes.unshift(note); deriveFolders();
    closeModal('modal-note'); renderFolders(); renderNotesList();
    openNote(note.id); setTimeout(() => document.getElementById('editor').focus(), 100);
    setStatus('saved', 'Guardado'); setTimeout(() => setStatus('', ''), 2000);
  } catch(e) { setStatus('error', 'Erro: ' + e.message); }
}
async function saveNote(showFeedback = true) {
  if (!activeNoteId) return;
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  note.title = document.getElementById('note-title').value || 'Sem título';
  note.content = document.getElementById('editor').innerHTML;
  note.updated_at = Date.now();
  document.getElementById('note-meta').textContent = 'Editado ' + formatDate(note.updated_at);
  if (showFeedback) setStatus('syncing', '<span class="spinner"></span> A guardar…');
  try {
    await sbUpsert(note); dirty = false; renderNotesList();
    if (showFeedback) { setStatus('saved', 'Guardado'); setTimeout(() => setStatus('', ''), 2000); }
  } catch(e) { setStatus('error', 'Erro: ' + e.message); }
}
async function deleteNote(id) {
  const note = notes.find(n => n.id === id);
  if (!confirm(`Apagar "${note?.title || 'esta nota'}"?`)) return;
  try {
    await sbDelete(id); notes = notes.filter(n => n.id !== id);
    if (activeNoteId === id) { activeNoteId = null; showEmptyState(); }
    deriveFolders(); renderFolders(); renderNotesList();
  } catch(e) { setStatus('error', 'Erro: ' + e.message); }
}
function markDirty() {
  dirty = true; setStatus('', '');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveNote(true), 1500);
  updateWordCount();
}
function updateWordCount() {
  const text = document.getElementById('editor').innerText || '';
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('status-words').textContent = words + (words === 1 ? ' palavra' : ' palavras');
}

function execCmd(cmd, val) { document.getElementById('editor').focus(); document.execCommand(cmd, false, val || null); }
function execFormat(tag) { document.getElementById('editor').focus(); document.execCommand('formatBlock', false, tag); }
function insertHR() { document.getElementById('editor').focus(); document.execCommand('insertHTML', false, '<hr>'); markDirty(); }

function saveSelection() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) savedSelection = sel.getRangeAt(0).cloneRange();
}
function restoreSelection() {
  if (!savedSelection) return;
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedSelection);
}
function toggleHighlightPicker(e) {
  e.stopPropagation(); saveSelection();
  document.getElementById('highlight-picker').classList.toggle('open');
}
function applyHighlight(color) {
  restoreSelection(); document.getElementById('editor').focus();
  document.execCommand('hiliteColor', false, color);
  document.getElementById('highlight-picker').classList.remove('open');
  markDirty();
}
function removeHighlight() {
  restoreSelection(); document.getElementById('editor').focus();
  document.execCommand('hiliteColor', false, 'transparent');
  document.getElementById('highlight-picker').classList.remove('open');
  markDirty();
}
document.addEventListener('click', e => { if (!e.target.closest('.picker-wrap') && e.target.id !== 'hl-custom-color') document.getElementById('highlight-picker').classList.remove('open'); });

document.getElementById('editor').addEventListener('paste', function(e) {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = ev => { document.execCommand('insertImage', false, ev.target.result); markDirty(); };
      reader.readAsDataURL(blob);
      return;
    }
  }
});

document.getElementById('editor').addEventListener('mouseup', saveSelection);
document.getElementById('editor').addEventListener('keyup', saveSelection);
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveNote(true); }
});

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function formatDate(ts) { return new Date(ts).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }); });

init();
</script>
</body>
</html>
